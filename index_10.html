</style>

<script>
(function(){

  /* ===================== 座標系 定数・変換 ===================== */
  const GRS80_A = 6378137.0;
  const GRS80_F = 298.257222101;
  const M0 = 0.9999;

  const ZONES = {
    1:[33,129+30/60], 2:[33,131], 3:[36,132+10/60], 4:[33,133+30/60],
    5:[36,134+20/60], 6:[36,136], 7:[36,137+10/60], 8:[36,138+30/60],
    9:[36,139+50/60], 10:[40,140+50/60], 11:[44,140+15/60], 12:[44,142+15/60],
    13:[44,144+15/60], 14:[26,142], 15:[26,127+30/60], 16:[26,124],
    17:[26,131], 18:[20,136], 19:[26,154]
  };
  const ZONE_LABELS = {
    1:"第1系(長崎・鹿児島西部等)",2:"第2系(福岡・佐賀・熊本・大分・宮崎・鹿児島東部)",
    3:"第3系(山口・島根・広島)",4:"第4系(香川・愛媛・徳島・高知)",
    5:"第5系(兵庫・鳥取・岡山)",6:"第6系(京都・大阪・福井・滋賀・三重・奈良・和歌山)",
    7:"第7系(石川・富山・岐阜・愛知)",8:"第8系(新潟・長野・山梨・静岡)",
    9:"第9系(東京・福島・栃木・茨城・埼玉・千葉・群馬・神奈川)",
    10:"第10系(青森・秋田・山形・岩手・宮城)",11:"第11系(小笠原諸島)",
    12:"第12系(北海道 西部)",13:"第13系(北海道 東部)",
    14:"第14系(東京都 南方諸島)",15:"第15系(沖縄本島)",
    16:"第16系(沖縄西部・宮古/八重山諸島)",17:"第17系(沖縄東部・大東諸島)",
    18:"第18系(小笠原 沖ノ鳥島)",19:"第19系(沖縄南方諸島)"
  };

  function toRad(d){ return d*Math.PI/180; }
  function toDeg(r){ return r*180/Math.PI; }

  function coeffs(){
    const n = 1/(2*GRS80_F - 1);
    const n2=n*n, n3=n2*n, n4=n3*n, n5=n4*n, n6=n5*n;
    const A = [
      1 + n2/4 + n4/64,
      -(3/2)*(n - n3/8 - n5/64),
      (15/16)*(n2 - n4/4),
      -(35/48)*(n3 - (5/16)*n5),
      (315/512)*n4,
      -(693/1280)*n5
    ];
    const alpha = [0,
      (1/2)*n - (2/3)*n2 + (5/16)*n3 + (41/180)*n4 - (127/288)*n5,
      (13/48)*n2 - (3/5)*n3 + (557/1440)*n4 + (281/630)*n5,
      (61/240)*n3 - (103/140)*n4 + (15061/26880)*n5,
      (49561/161280)*n4 - (179/168)*n5,
      (34729/80640)*n5
    ];
    const beta = [0,
      (1/2)*n - (2/3)*n2 + (37/96)*n3 - (1/360)*n4 - (81/512)*n5,
      (1/48)*n2 + (1/15)*n3 - (437/1440)*n4 + (46/105)*n5,
      (17/480)*n3 - (37/840)*n4 - (209/4480)*n5,
      (4397/161280)*n4 - (11/504)*n5,
      (4583/161280)*n5
    ];
    const delta = [0,
      2*n - (2/3)*n2 - 2*n3 + (116/45)*n4 + (26/45)*n5 - (2854/675)*n6,
      (7/3)*n2 - (8/5)*n3 - (227/45)*n4 + (2704/315)*n5 + (2323/945)*n6,
      (56/15)*n3 - (136/35)*n4 - (1262/105)*n5 + (73814/2835)*n6,
      (4279/630)*n4 - (332/35)*n5 - (399572/14175)*n6,
      (4174/315)*n5 - (144838/6237)*n6,
      (601676/22275)*n6
    ];
    return {n, A, alpha, beta, delta};
  }

  function baseParams(phi0){
    const c = coeffs();
    let S0 = c.A[0]*phi0;
    for(let j=1;j<=5;j++){ S0 += c.A[j]*Math.sin(2*j*phi0); }
    const Sbar0 = (M0*GRS80_A/(1+c.n)) * S0;
    const Abar = (M0*GRS80_A/(1+c.n)) * c.A[0];
    return {c, Sbar0, Abar};
  }

  // 緯度経度(度) -> 平面直角座標 X,Y(m)
  function latLngToXY(lat, lng, zone){
    const [phi0d, lambda0d] = ZONES[zone];
    const phi0 = toRad(phi0d), lambda0 = toRad(lambda0d);
    const phi = toRad(lat), lambda = toRad(lng);
    const {c, Sbar0, Abar} = baseParams(phi0);
    const n = c.n;
    const lambdaC = Math.cos(lambda - lambda0);
    const lambdaS = Math.sin(lambda - lambda0);
    const k = 2*Math.sqrt(n)/(1+n);
    const t = Math.sinh( Math.atanh(Math.sin(phi)) - k*Math.atanh(k*Math.sin(phi)) );
    const tbar = Math.sqrt(1+t*t);
    const xip = Math.atan2(t, lambdaC);
    const etap = Math.atanh(lambdaS/tbar);
    let xSum = xip, ySum = etap;
    for(let j=1;j<=5;j++){
      xSum += c.alpha[j]*Math.sin(2*j*xip)*Math.cosh(2*j*etap);
      ySum += c.alpha[j]*Math.cos(2*j*xip)*Math.sinh(2*j*etap);
    }
    return { X: Abar*xSum - Sbar0, Y: Abar*ySum };
  }

  // 平面直角座標 X,Y(m) -> 緯度経度(度)
  function xyToLatLng(X, Y, zone){
    const [phi0d, lambda0d] = ZONES[zone];
    const phi0 = toRad(phi0d), lambda0 = toRad(lambda0d);
    const {c, Sbar0, Abar} = baseParams(phi0);
    const xi = (X + Sbar0)/Abar;
    const eta = Y/Abar;
    let xip = xi, etap = eta;
    for(let j=1;j<=5;j++){
      xip -= c.beta[j]*Math.sin(2*j*xi)*Math.cosh(2*j*eta);
      etap -= c.beta[j]*Math.cos(2*j*xi)*Math.sinh(2*j*eta);
    }
    const chi = Math.asin( Math.sin(xip)/Math.cosh(etap) );
    let phi = chi;
    for(let j=1;j<=6;j++){ phi += c.delta[j]*Math.sin(2*j*chi); }
    const lambda = lambda0 + Math.atan2(Math.sinh(etap), Math.cos(xip));
    return { lat: toDeg(phi), lng: toDeg(lambda) };
  }

  /* ===================== アプリ状態 ===================== */
  let points = [];      // {id,name,lat,lng}
  let currentZone = 9;  // デフォルト: 東京・関東周辺
  let addMode = false;
  let map, markersLayer;
  let pendingClick = null; // {lat,lng} 名前入力待ち

  // 現在地(GPS)関連
  let currentLocation = null; // {lat,lng,acc}
  let currentLocMarker = null;
  let currentLocCircle = null;
  let watchId = null;
  let liveTracking = false;

  function geoErrorMessage(err){
    switch(err.code){
      case err.PERMISSION_DENIED: return '位置情報の利用が許可されていません。ブラウザやOSの設定で位置情報を許可してください。';
      case err.POSITION_UNAVAILABLE: return '位置情報を取得できませんでした。電波状況の良い場所でお試しください。';
      case err.TIMEOUT: return '位置情報の取得がタイムアウトしました。';
      default: return err.message || '不明なエラーが発生しました。';
    }
  }

  function updateLocationMarker(pos){
    currentLocation = { lat: pos.coords.latitude, lng: pos.coords.longitude, acc: pos.coords.accuracy || 0 };
    if(!currentLocMarker){
      currentLocMarker = L.circleMarker([currentLocation.lat,currentLocation.lng], {
        radius: 8, color: '#2C4A6E', weight: 2, fillColor: '#5b9bd5', fillOpacity: 0.95
      }).addTo(map);
      currentLocCircle = L.circle([currentLocation.lat,currentLocation.lng], {
        radius: currentLocation.acc, color: '#2C4A6E', weight: 1, fillOpacity: 0.08
      }).addTo(map);
    } else {
      currentLocMarker.setLatLng([currentLocation.lat,currentLocation.lng]);
      currentLocCircle.setLatLng([currentLocation.lat,currentLocation.lng]);
      currentLocCircle.setRadius(currentLocation.acc);
    }
    const statusEl = document.getElementById('geo-status');
    if(statusEl){
      statusEl.textContent = '現在地: ' + currentLocation.lat.toFixed(6) + ', ' + currentLocation.lng.toFixed(6) + '　(誤差 ±' + Math.round(currentLocation.acc) + 'm)';
    }
  }

  function requestCurrentLocation(centerMap){
    if(!navigator.geolocation){ alert('この端末・ブラウザでは位置情報を利用できません。'); return; }
    navigator.geolocation.getCurrentPosition((pos)=>{
      updateLocationMarker(pos);
      if(centerMap){ map.setView([pos.coords.latitude,pos.coords.longitude], Math.max(map.getZoom(),18)); }
    }, (err)=>{
      alert('位置情報の取得に失敗しました。\n' + geoErrorMessage(err));
    }, { enableHighAccuracy: true, timeout: 10000, maximumAge: 5000 });
  }

  function toggleTracking(){
    const btn = document.getElementById('geo-track-toggle');
    if(!liveTracking){
      if(!navigator.geolocation){ alert('この端末・ブラウザでは位置情報を利用できません。'); return; }
      watchId = navigator.geolocation.watchPosition(
        (pos)=>{ updateLocationMarker(pos); },
        (err)=>{ alert('位置情報の取得に失敗しました。\n' + geoErrorMessage(err)); },
        { enableHighAccuracy: true, maximumAge: 2000, timeout: 15000 }
      );
      liveTracking = true;
      btn.classList.add('active');
      btn.textContent = '現在地の追跡：ON';
    } else {
      if(watchId != null){ navigator.geolocation.clearWatch(watchId); watchId = null; }
      liveTracking = false;
      btn.classList.remove('active');
      btn.textContent = '現在地の追跡：OFF';
    }
  }

  function registerCurrentLocation(){
    if(!currentLocation){
      alert('先に「現在地に移動」または「現在地の追跡」で位置情報を取得してください。');
      return;
    }
    openNameModal({ lat: currentLocation.lat, lng: currentLocation.lng });
  }

  const STORAGE_KEY = 'boundary_points_v1';
  const ZONE_KEY = 'boundary_points_zone_v1';

  // Claudeのアーティファクト内ではwindow.storageを、単体のHTMLファイルとして
  // 開いた場合はブラウザのlocalStorageを自動的に使い分ける
  async function storageGet(key){
    if(window.storage && typeof window.storage.get === 'function'){
      try{
        const r = await window.storage.get(key);
        return r ? r.value : null;
      }catch(e){ /* キー未登録などはフォールバックへ */ }
    }
    try{ return localStorage.getItem(key); }catch(e){ return null; }
  }
  async function storageSet(key, value){
    if(window.storage && typeof window.storage.set === 'function'){
      try{ await window.storage.set(key, value); return; }catch(e){}
    }
    try{ localStorage.setItem(key, value); }catch(e){ console.error('保存に失敗しました', e); }
  }

  async function loadState(){
    try{
      const v = await storageGet(STORAGE_KEY);
      if(v){ points = JSON.parse(v); }
    }catch(e){ points = []; }
    try{
      const z = await storageGet(ZONE_KEY);
      if(z){ currentZone = parseInt(z,10) || 9; }
    }catch(e){}
  }
  async function saveState(){
    await storageSet(STORAGE_KEY, JSON.stringify(points));
  }
  async function saveZone(){
    await storageSet(ZONE_KEY, String(currentZone));
  }

  function uid(){ return 'p_' + Math.random().toString(36).slice(2,10); }

  /* ===================== スクリプト読み込み ===================== */
  function loadScript(src){
    return new Promise((resolve,reject)=>{
      const s = document.createElement('script');
      s.src = src; s.onload = resolve; s.onerror = reject;
      document.head.appendChild(s);
    });
  }
  function loadCss(href){
    const l = document.createElement('link');
    l.rel = 'stylesheet'; l.href = href;
    document.head.appendChild(l);
  }

  /* ===================== 初期化 ===================== */
  async function init(){
    loadCss('https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css');
    await loadScript('https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js');
    await loadState();
    buildUI();
    initMap();
    renderPoints();
  }

  function buildUI(){
    const root = document.getElementById('app-root');
    root.innerHTML = `
      <div class="header">
        <div>
          <h1>境界点測量マップ</h1>
          <div class="sub">地籍調査 境界点 登録 / 座標インポート・エクスポート</div>
        </div>
        <div class="stamp">登録点<span id="count-badge" class="count-badge">0</span></div>
      </div>
      <div class="body-flex">
        <div class="sidebar">
          <div class="section">
            <div class="section-title">作業座標系</div>
            <select id="zone-select"></select>
            <div class="disclaimer">
              座標変換は国土地理院公開のガウス・クリューゲル投影式に基づく近似実装です。地籍調査等、公的な精度が求められる用途では
              <a href="https://vldb.gsi.go.jp/sokuchi/surveycalc/surveycalc/bl2xyf.html" target="_blank" rel="noopener">国土地理院 測量計算サイト</a>
              で検算してください。
            </div>
          </div>

          <div class="section">
            <div class="section-title">背景地図</div>
            <select id="basemap-select">
              <option value="gsiStd">地理院地図（標準・地形線あり）</option>
              <option value="gsiPale">地理院地図（淡色）</option>
              <option value="openTopo">OpenTopoMap（山林・等高線）</option>
              <option value="esriSat">衛星写真（Esri）</option>
              <option value="gsiPhoto">航空写真（地理院）</option>
              <option value="osm">OpenStreetMap</option>
            </select>
            <div class="disclaimer">
              Googleマップの地図タイルは、Google公式のAPIキーがないと利用規約上組み込めません。ご自身のAPIキーをお持ちであれば追加対応できます。似た見え方の衛星写真として「衛星写真（Esri）」を選べます。
            </div>
          </div>

          <div class="section">
            <div class="section-title">現在地(GPS)</div>
            <div class="btn-row">
              <button id="geo-locate-btn" class="btn secondary full">現在地に移動</button>
            </div>
            <div style="height:6px;"></div>
            <button id="geo-track-toggle" class="toggle-mode">現在地の追跡：OFF</button>
            <div id="geo-status" class="mono" style="font-size:11px;color:var(--ink-soft);margin-top:8px;min-height:14px;">位置情報は未取得です</div>
            <button id="geo-register-btn" class="btn full" style="margin-top:8px;">現在地をこの点として登録</button>
          </div>

          <div class="section">
            <div class="section-title">点を追加</div>
            <button id="toggle-add-mode" class="toggle-mode">地図クリックで点を追加：OFF</button>
            <div style="height:10px;"></div>
            <div class="radio-tabs" id="input-type-tabs">
              <div data-type="latlng" class="active">緯度経度で入力</div>
              <div data-type="xy">X, Yで入力</div>
            </div>
            <div class="row">
              <div>
                <label class="field-label">点名</label>
                <input type="text" id="manual-name" placeholder="例：K-12">
              </div>
            </div>
            <div class="row" id="latlng-inputs">
              <div>
                <label class="field-label">緯度 (度)</label>
                <input type="number" step="any" id="manual-lat" placeholder="35.681236">
              </div>
              <div>
                <label class="field-label">経度 (度)</label>
                <input type="number" step="any" id="manual-lng" placeholder="139.767125">
              </div>
            </div>
            <div class="row" id="xy-inputs" style="display:none;">
              <div>
                <label class="field-label">X座標 (m)</label>
                <input type="number" step="any" id="manual-x" placeholder="-35400.123">
              </div>
              <div>
                <label class="field-label">Y座標 (m)</label>
                <input type="number" step="any" id="manual-y" placeholder="12500.456">
              </div>
            </div>
            <button id="manual-add-btn" class="btn full">この点を追加</button>
          </div>

          <div class="section">
            <div class="section-title">SIMAデータ</div>
            <div class="btn-row">
              <button id="sima-import-btn" class="btn secondary">SIMA読込 (.sim)</button>
              <button id="sima-export-btn" class="btn secondary">SIMA書出</button>
            </div>
            <input type="file" id="import-file-input" accept=".sim,.txt,.csv">
            <div style="height:6px;"></div>
            <div class="btn-row">
              <button id="csv-export-btn" class="btn secondary">CSV書出</button>
              <button id="clear-all-btn" class="btn danger">全点削除</button>
            </div>
          </div>

          <div class="point-list" id="point-list"></div>
          <div class="footer-note">クリックで地図上の位置に移動 / 右の×で削除</div>
        </div>
        <div class="map-wrap">
          <div id="leaflet-map"></div>
        </div>
      </div>
    `;

    // 系プルダウン
    const zoneSelect = document.getElementById('zone-select');
    for(let z=1; z<=19; z++){
      const opt = document.createElement('option');
      opt.value = z;
      opt.textContent = z + '系 - ' + ZONE_LABELS[z];
      if(z === currentZone) opt.selected = true;
      zoneSelect.appendChild(opt);
    }
    zoneSelect.addEventListener('change', ()=>{
      currentZone = parseInt(zoneSelect.value,10);
      saveZone();
      renderPoints();
    });

    document.getElementById('basemap-select').addEventListener('change', (e)=>{
      switchBasemap(e.target.value);
    });

    document.getElementById('toggle-add-mode').addEventListener('click', (e)=>{
      addMode = !addMode;
      e.target.classList.toggle('active', addMode);
      e.target.textContent = '地図クリックで点を追加：' + (addMode ? 'ON' : 'OFF');
    });

    document.querySelectorAll('#input-type-tabs > div').forEach(tab=>{
      tab.addEventListener('click', ()=>{
        document.querySelectorAll('#input-type-tabs > div').forEach(t=>t.classList.remove('active'));
        tab.classList.add('active');
        const isXY = tab.dataset.type === 'xy';
        document.getElementById('latlng-inputs').style.display = isXY ? 'none' : 'flex';
        document.getElementById('xy-inputs').style.display = isXY ? 'flex' : 'none';
      });
    });

    document.getElementById('manual-add-btn').addEventListener('click', onManualAdd);
    document.getElementById('geo-locate-btn').addEventListener('click', ()=> requestCurrentLocation(true));
    document.getElementById('geo-track-toggle').addEventListener('click', toggleTracking);
    document.getElementById('geo-register-btn').addEventListener('click', registerCurrentLocation);
    document.getElementById('sima-import-btn').addEventListener('click', ()=> document.getElementById('import-file-input').click());
    document.getElementById('import-file-input').addEventListener('change', onSimaFileSelected);
    document.getElementById('sima-export-btn').addEventListener('click', exportSima);
    document.getElementById('csv-export-btn').addEventListener('click', exportCsv);
    document.getElementById('clear-all-btn').addEventListener('click', onClearAll);
  }

  let baseLayers = {};
  let activeBaseLayer = null;

  function initMap(){
    map = L.map('leaflet-map', { zoomControl: true, maxZoom: 22 }).setView([35.681236,139.767125], 17);

    baseLayers = {
      gsiStd: L.tileLayer('https://cyberjapandata.gsi.go.jp/xyz/std/{z}/{x}/{y}.png', {
        maxZoom: 22, maxNativeZoom: 18, attribution: '国土地理院'
      }),
      gsiPale: L.tileLayer('https://cyberjapandata.gsi.go.jp/xyz/pale/{z}/{x}/{y}.png', {
        maxZoom: 22, maxNativeZoom: 18, attribution: '国土地理院'
      }),
      openTopo: L.tileLayer('https://{s}.tile.opentopomap.org/{z}/{x}/{y}.png', {
        maxZoom: 22, maxNativeZoom: 17,
        attribution: '&copy; OpenStreetMap contributors, SRTM | &copy; OpenTopoMap (CC-BY-SA)'
      }),
      esriSat: L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', {
        maxZoom: 22, maxNativeZoom: 18,
        attribution: 'Esri, Maxar, Earthstar Geographics'
      }),
      gsiPhoto: L.tileLayer('https://cyberjapandata.gsi.go.jp/xyz/seamlessphoto/{z}/{x}/{y}.jpg', {
        maxZoom: 22, maxNativeZoom: 18, attribution: '国土地理院 航空写真'
      }),
      osm: L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        maxZoom: 22, maxNativeZoom: 19, attribution: '&copy; OpenStreetMap contributors'
      })
    };

    activeBaseLayer = baseLayers.gsiStd;
    activeBaseLayer.addTo(map);

    markersLayer = L.layerGroup().addTo(map);

    map.on('click', (e)=>{
      if(!addMode) return;
      pendingClick = { lat: e.latlng.lat, lng: e.latlng.lng };
      openNameModal(pendingClick);
    });

    if(points.length){
      const bounds = L.latLngBounds(points.map(p=>[p.lat,p.lng]));
      map.fitBounds(bounds, {maxZoom:19, padding:[40,40]});
    }
  }

  function switchBasemap(key){
    const next = baseLayers[key];
    if(!next || next === activeBaseLayer) return;
    if(activeBaseLayer) map.removeLayer(activeBaseLayer);
    next.addTo(map);
    activeBaseLayer = next;
  }

  function openNameModal(latlng){
    const overlay = document.createElement('div');
    overlay.className = 'modal-overlay';
    overlay.innerHTML = `
      <div class="modal-box">
        <h3>境界点を登録</h3>
        <div class="coord-readout mono">緯度 ${latlng.lat.toFixed(6)} / 経度 ${latlng.lng.toFixed(6)}</div>
        <label class="field-label">点名</label>
        <input type="text" id="modal-point-name" placeholder="例：K-13" style="margin-bottom:12px;">
        <div class="btn-row">
          <button class="btn full" id="modal-confirm">登録</button>
          <button class="btn secondary full" id="modal-cancel">取消</button>
        </div>
      </div>
    `;
    document.body.appendChild(overlay);
    const input = overlay.querySelector('#modal-point-name');
    input.focus();
    function close(){ document.body.removeChild(overlay); }
    overlay.querySelector('#modal-cancel').addEventListener('click', close);
    overlay.querySelector('#modal-confirm').addEventListener('click', ()=>{
      const name = input.value.trim() || ('点' + (points.length+1));
      addPoint(name, latlng.lat, latlng.lng);
      close();
    });
    input.addEventListener('keydown', (e)=>{ if(e.key === 'Enter'){ overlay.querySelector('#modal-confirm').click(); } });
  }

  function addPoint(name, lat, lng){
    points.push({ id: uid(), name, lat, lng });
    saveState();
    renderPoints();
  }

  function onManualAdd(){
    const name = document.getElementById('manual-name').value.trim();
    if(!name){ alert('点名を入力してください。'); return; }
    const isXY = document.querySelector('#input-type-tabs > div.active').dataset.type === 'xy';
    let lat, lng;
    if(isXY){
      const x = parseFloat(document.getElementById('manual-x').value);
      const y = parseFloat(document.getElementById('manual-y').value);
      if(isNaN(x) || isNaN(y)){ alert('X, Yを入力してください。'); return; }
      const ll = xyToLatLng(x,y,currentZone);
      lat = ll.lat; lng = ll.lng;
    } else {
      lat = parseFloat(document.getElementById('manual-lat').value);
      lng = parseFloat(document.getElementById('manual-lng').value);
      if(isNaN(lat) || isNaN(lng)){ alert('緯度・経度を入力してください。'); return; }
    }
    addPoint(name, lat, lng);
    document.getElementById('manual-name').value = '';
    document.getElementById('manual-lat').value = '';
    document.getElementById('manual-lng').value = '';
    document.getElementById('manual-x').value = '';
    document.getElementById('manual-y').value = '';
    map.setView([lat,lng], Math.max(map.getZoom(),18));
  }

  function deletePoint(id){
    points = points.filter(p=>p.id !== id);
    saveState();
    renderPoints();
  }

  function onClearAll(){
    if(!points.length) return;
    if(!confirm('登録されている全ての点(' + points.length + '件)を削除します。よろしいですか？')) return;
    points = [];
    saveState();
    renderPoints();
  }

  function flyTo(p){
    map.setView([p.lat,p.lng], Math.max(map.getZoom(),18));
  }

  function renderPoints(){
    document.getElementById('count-badge').textContent = points.length;
    markersLayer.clearLayers();
    points.forEach(p=>{
      const marker = L.circleMarker([p.lat,p.lng], {
        radius: 7, color: '#B23A34', weight: 2, fillColor: '#fff', fillOpacity: 1
      }).addTo(markersLayer);
      const xy = latLngToXY(p.lat, p.lng, currentZone);
      marker.bindPopup(
        '<b>' + escapeHtml(p.name) + '</b><br>' +
        '緯度経度: ' + p.lat.toFixed(6) + ', ' + p.lng.toFixed(6) + '<br>' +
        'X: ' + xy.X.toFixed(3) + '&nbsp;&nbsp;Y: ' + xy.Y.toFixed(3)
      );
      marker.bindTooltip(escapeHtml(p.name), {
        permanent: true, direction: 'right', offset: [9,0], className: 'point-label'
      }).openTooltip();
    });

    const list = document.getElementById('point-list');
    if(!points.length){
      list.innerHTML = '<div class="empty-state">まだ点が登録されていません。<br>地図をクリックするか、左のフォームから点を追加、<br>またはSIMAファイルを読込してください。</div>';
      return;
    }
    list.innerHTML = points.map(p=>{
      const xy = latLngToXY(p.lat,p.lng,currentZone);
      return `
        <div class="point-item" data-id="${p.id}">
          <div class="pname">
            <span>${escapeHtml(p.name)}</span>
            <button class="pdel" data-id="${p.id}">×</button>
          </div>
          <div class="pcoord mono">
            緯度経度 ${p.lat.toFixed(6)}, ${p.lng.toFixed(6)}<br>
            X ${xy.X.toFixed(3)} / Y ${xy.Y.toFixed(3)}
          </div>
        </div>
      `;
    }).join('');

    list.querySelectorAll('.point-item').forEach(el=>{
      el.addEventListener('click', (e)=>{
        if(e.target.classList.contains('pdel')) return;
        const p = points.find(pp=>pp.id === el.dataset.id);
        if(p) flyTo(p);
      });
    });
    list.querySelectorAll('.pdel').forEach(btn=>{
      btn.addEventListener('click', (e)=>{
        e.stopPropagation();
        deletePoint(btn.dataset.id);
      });
    });
  }

  function escapeHtml(s){
    return String(s).replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
  }

  /* ===================== SIMA 読込／書出 ===================== */
  function onSimaFileSelected(e){
    const file = e.target.files[0];
    if(!file) return;
    const reader = new FileReader();
    reader.onload = (ev)=>{
      try{
        const imported = parseSima(ev.target.result);
        if(!imported.length){
          alert('SIMAファイルから座標データ(A0x行)を検出できませんでした。ファイル形式をご確認ください。');
          return;
        }
        imported.forEach(pt=>{
          const ll = xyToLatLng(pt.x, pt.y, currentZone);
          points.push({ id: uid(), name: pt.name, lat: ll.lat, lng: ll.lng });
        });
        saveState();
        renderPoints();
        const bounds = L.latLngBounds(points.map(p=>[p.lat,p.lng]));
        map.fitBounds(bounds, {maxZoom:19, padding:[40,40]});
        alert(imported.length + '件の点を読み込みました（' + currentZone + '系で変換）。');
      }catch(err){
        console.error(err);
        alert('SIMAファイルの読込に失敗しました：' + err.message);
      }
      e.target.value = '';
    };
    reader.readAsText(file, 'Shift_JIS');
  }

  // SIMA共通フォーマットの座標データ行(A0x: 点番号,点名,X,Y,Z,...)を抽出
  function parseSima(text){
    // Shift_JISで文字化けする場合に備えてUTF-8でも読めるようにフォールバックはしない（テキスト前提）
    const lines = text.split(/\r\n|\r|\n/);
    const results = [];
    for(const raw of lines){
      const line = raw.trim();
      if(!line) continue;
      const fields = line.split(',');
      const code = fields[0].trim().toUpperCase();
      if(!/^A\d{2}$/.test(code)) continue;
      if(code === 'A00' || code === 'A99') continue;
      // A01,点番号,点名,X,Y,Z,...
      if(fields.length < 5) continue;
      const name = (fields[2] || '').trim();
      const x = parseFloat(fields[3]);
      const y = parseFloat(fields[4]);
      if(isNaN(x) || isNaN(y)) continue;
      results.push({ name: name || ('P' + (results.length+1)), x, y });
    }
    return results;
  }

  function exportSima(){
    if(!points.length){ alert('登録されている点がありません。'); return; }
    const lines = [];
    lines.push('G00,04,boundary_points,');
    lines.push('Z01,,');
    lines.push('A00,');
    points.forEach((p, idx)=>{
      const xy = latLngToXY(p.lat, p.lng, currentZone);
      lines.push('A01,' + (idx+1) + ',' + p.name + ',' + xy.X.toFixed(3) + ',' + xy.Y.toFixed(3) + ',0.000,,');
    });
    lines.push('A99,');
    lines.push('G99,');
    downloadText(lines.join('\r\n') + '\r\n', 'boundary_points.sim', 'text/plain');
  }

  function exportCsv(){
    if(!points.length){ alert('登録されている点がありません。'); return; }
    const rows = ['点名,緯度,経度,X座標,Y座標,系'];
    points.forEach(p=>{
      const xy = latLngToXY(p.lat, p.lng, currentZone);
      rows.push([p.name, p.lat.toFixed(8), p.lng.toFixed(8), xy.X.toFixed(3), xy.Y.toFixed(3), currentZone].join(','));
    });
    downloadText(rows.join('\r\n') + '\r\n', 'boundary_points.csv', 'text/csv');
  }

  function downloadText(content, filename, mime){
    const blob = new Blob([content], {type: mime + ';charset=utf-8'});
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; a.download = filename;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
  }

  init();
})();
</script>
